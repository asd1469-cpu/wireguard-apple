name: Build libwg-go.a for iOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build libwg-go.a (iOS arm64)
        run: |
          cd Sources/WireGuardKitGo
          mkdir -p out
          make \
            PLATFORM_NAME=iphoneos \
            ARCHS=arm64 \
            CONFIGURATION_BUILD_DIR="$(pwd)/out" \
            CONFIGURATION_TEMP_DIR="$(pwd)/.tmp"

      - name: Commit binary to repo
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -f Sources/WireGuardKitGo/out/libwg-go.a
          git commit -m "ci: pre-built libwg-go.a for iOS arm64" || echo "No changes to commit"
          git push
